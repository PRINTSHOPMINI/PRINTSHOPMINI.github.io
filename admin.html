<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공지사항 관리 - 프린트샵미니</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1B8AC4;--blue-hover:#1470A8;--blue-light:#E8F4FC;--text:#111827;--text2:#374151;--text3:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;--red:#EF4444;--red-light:#FEF2F2;--green:#16A34A;--green-light:#F0FDF4;--radius:14px}
body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:white;border-radius:20px;padding:48px 40px;width:90%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.1);text-align:center}
.login-logo{font-size:36px;margin-bottom:12px}
.login-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:32px}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--blue)}
.login-btn{width:100%;background:var(--blue);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.login-btn:hover{background:var(--blue-hover)}
.login-err{font-size:13px;color:var(--red);margin-top:10px;display:none}

/* ADMIN LAYOUT */
.admin-wrap{display:none;max-width:900px;margin:0 auto;padding:40px 24px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.admin-title{font-size:24px;font-weight:900;letter-spacing:-.5px}
.admin-title span{color:var(--blue)}
.logout-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--text2);border-radius:50px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.home-btn{background:var(--blue-light);border:none;color:var(--blue);border-radius:50px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-decoration:none;display:inline-block}

/* ADD FORM */
.add-box{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:32px}
.add-box-title{font-size:16px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.add-box-title::before{content:'';width:4px;height:18px;background:var(--blue);border-radius:2px;display:block}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.form-row input,.form-row textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row textarea:focus{border-color:var(--blue)}
.form-row textarea{resize:vertical;min-height:160px;line-height:1.7}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.btn-primary{background:var(--blue);color:white;border:none;border-radius:50px;padding:11px 28px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.btn-primary:hover{background:var(--blue-hover)}
.btn-primary:disabled{background:#9CA3AF;cursor:not-allowed}
.btn-cancel{background:var(--bg);color:var(--text2);border:1.5px solid var(--border);border-radius:50px;padding:11px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* NOTICE LIST */
.list-box{background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.list-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.list-title{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px}
.list-title::before{content:'';width:4px;height:18px;background:var(--blue);border-radius:2px;display:block}
.notice-count{font-size:13px;color:var(--text3);font-weight:500}
.notice-card{border-bottom:1px solid var(--border);padding:20px 24px;transition:background .15s}
.notice-card:last-child{border-bottom:none}
.notice-card:hover{background:var(--bg)}
.nc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.nc-title{font-size:15px;font-weight:700;line-height:1.5;flex:1}
.nc-actions{display:flex;gap:8px;flex-shrink:0}
.btn-edit{background:var(--blue-light);color:var(--blue);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.btn-edit:hover{background:#d0e8f6}
.btn-del{background:var(--red-light);color:var(--red);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.btn-del:hover{background:#fde2e2}
.nc-meta{font-size:12px;color:var(--text3);margin-top:8px}
.nc-excerpt{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.list-empty{padding:48px;text-align:center;color:var(--text3);font-size:14px}

/* EDIT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:20px;padding:36px;width:90%;max-width:640px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;font-size:26px;cursor:pointer;color:var(--text3)}
.modal-close:hover{color:var(--text)}
.modal-title{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:24px}

/* STATUS */
.status-bar{border-radius:10px;padding:12px 16px;font-size:13px;font-weight:700;margin-bottom:16px;display:none}
.status-bar.ok{background:var(--green-light);color:var(--green)}
.status-bar.err{background:var(--red-light);color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;color:white;padding:12px 28px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* EMOJI PICKER */
.emoji-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.emoji-label-row label{font-size:12px;font-weight:700;color:var(--text2)}
.emoji-toggle-btn{background:var(--blue-light);color:var(--blue);border:none;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .2s}
.emoji-toggle-btn:hover{background:#d0e8f6}
.emoji-panel{display:none;background:white;border:1.5px solid var(--border);border-radius:14px;padding:16px;margin-bottom:8px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.emoji-panel.open{display:block}
.emoji-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.emoji-cat-btn{font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;border:1.5px solid var(--border);color:var(--text3);cursor:pointer;background:white;transition:all .15s}
.emoji-cat-btn:hover,.emoji-cat-btn.on{background:var(--blue);color:white;border-color:var(--blue)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px}
.emoji-item{font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;transition:background .15s;border:none;background:none}
.emoji-item:hover{background:var(--blue-light)}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">🦝</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">프린트샵미니 공지사항 관리</div>
    <input class="login-input" type="password" id="pwInput" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 관리 화면 -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-title">🦝 <span>공지사항</span> 관리</div>
    <div style="display:flex;gap:8px">
      <a href="community.html" class="home-btn">← 홈페이지로</a>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <!-- 공지 등록 -->
  <div class="add-box">
    <div class="add-box-title">새 공지사항 등록</div>
    <div class="status-bar" id="addStatus"></div>
    <div class="form-row">
      <label>제목</label>
      <input type="text" id="addTitle" placeholder="공지사항 제목을 입력하세요">
    </div>
    <div class="form-row">
      <label>날짜</label>
      <input type="text" id="addDate" placeholder="예: 2026.04.30">
    </div>
    <div class="form-row">
      <div class="emoji-label-row">
        <label>내용</label>
        <button class="emoji-toggle-btn" type="button" onclick="toggleEmoji('addEmoji','addBody')">😊 이모지</button>
      </div>
      <div class="emoji-panel" id="addEmoji"></div>
      <textarea id="addBody" placeholder="공지사항 내용을 입력하세요&#10;줄바꿈은 Enter로 입력하세요"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="addBtn" onclick="addNotice()">등록하기</button>
    </div>
  </div>

  <!-- 공지 목록 -->
  <div class="list-box">
    <div class="list-header">
      <div class="list-title">등록된 공지사항</div>
      <div class="notice-count" id="noticeCount"></div>
    </div>
    <div id="noticeList"><div class="list-empty">불러오는 중...</div></div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEditModal()">×</button>
    <div class="modal-title">✏️ 공지사항 수정</div>
    <div class="status-bar" id="editStatus"></div>
    <input type="hidden" id="editId">
    <div class="form-row">
      <label>제목</label>
      <input type="text" id="editTitle">
    </div>
    <div class="form-row">
      <label>날짜</label>
      <input type="text" id="editDate">
    </div>
    <div class="form-row">
      <div class="emoji-label-row">
        <label>내용</label>
        <button class="emoji-toggle-btn" type="button" onclick="toggleEmoji('editEmoji','editBody')">😊 이모지</button>
      </div>
      <div class="emoji-panel" id="editEmoji"></div>
      <textarea id="editBody" style="min-height:220px"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-primary" id="editBtn" onclick="saveEdit()">저장하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL='https://wbcfciiuiootbdezxfwy.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndiY2ZjaWl1aW9vdGJkZXp4Znd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjkyMTQsImV4cCI6MjA5MzEwNTIxNH0.UV4ukUXuAYKAqq85B4FTHO2BtIOqPaBHgAJN5lqyU5s';
var SB_HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
var ADMIN_PW='printshop1234';

function doLogin(){
  var pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PW){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    setTodayDate();
    loadNotices();
  }else{
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}
function doLogout(){
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('adminWrap').style.display='none';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
}
function setTodayDate(){
  var d=new Date();
  var s=d.getFullYear()+'.'+(String(d.getMonth()+1).padStart(2,'0'))+'.'+String(d.getDate()).padStart(2,'0');
  document.getElementById('addDate').value=s;
}

async function loadNotices(){
  var r=await fetch(SB_URL+'/rest/v1/notices?order=created_at.desc',{headers:SB_HDR});
  var data=await r.json();
  var el=document.getElementById('noticeList');
  document.getElementById('noticeCount').textContent='총 '+data.length+'건';
  if(!data.length){el.innerHTML='<div class="list-empty">등록된 공지사항이 없습니다.</div>';return;}
  el.innerHTML=data.map(function(n){
    return '<div class="notice-card">'+
      '<div class="nc-top">'+
        '<div class="nc-title">'+escHtml(n.title)+'</div>'+
        '<div class="nc-actions">'+
          '<button class="btn-edit" onclick="openEditModal('+n.id+')">수정</button>'+
          '<button class="btn-del" onclick="deleteNotice('+n.id+',\''+escAttr(n.title)+'\')">삭제</button>'+
        '</div>'+
      '</div>'+
      '<div class="nc-meta">📅 '+escHtml(n.date)+'</div>'+
      '<div class="nc-excerpt">'+escHtml(n.body)+'</div>'+
      '</div>';
  }).join('');
}

async function addNotice(){
  var title=document.getElementById('addTitle').value.trim();
  var date=document.getElementById('addDate').value.trim();
  var body=document.getElementById('addBody').value.trim();
  var st=document.getElementById('addStatus');
  if(!title||!body||!date){showStatus(st,'err','제목, 날짜, 내용을 모두 입력해 주세요.');return;}
  var btn=document.getElementById('addBtn');
  btn.disabled=true;btn.textContent='등록 중...';
  try{
    var r=await fetch(SB_URL+'/rest/v1/notices',{method:'POST',headers:SB_HDR,body:JSON.stringify({title:title,date:date,body:body,views:0})});
    if(!r.ok)throw new Error();
    showStatus(st,'ok','✅ 공지사항이 등록되었습니다!');
    document.getElementById('addTitle').value='';
    document.getElementById('addBody').value='';
    setTodayDate();
    loadNotices();
  }catch(e){
    showStatus(st,'err','❌ 등록에 실패했습니다. 다시 시도해 주세요.');
  }
  btn.disabled=false;btn.textContent='등록하기';
}

var noticesData=[];
async function openEditModal(id){
  var r=await fetch(SB_URL+'/rest/v1/notices?id=eq.'+id,{headers:SB_HDR});
  var data=await r.json();
  if(!data.length)return;
  var n=data[0];
  document.getElementById('editId').value=n.id;
  document.getElementById('editTitle').value=n.title;
  document.getElementById('editDate').value=n.date;
  document.getElementById('editBody').value=n.body;
  document.getElementById('editStatus').style.display='none';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}

async function saveEdit(){
  var id=document.getElementById('editId').value;
  var title=document.getElementById('editTitle').value.trim();
  var date=document.getElementById('editDate').value.trim();
  var body=document.getElementById('editBody').value.trim();
  var st=document.getElementById('editStatus');
  if(!title||!body||!date){showStatus(st,'err','제목, 날짜, 내용을 모두 입력해 주세요.');return;}
  var btn=document.getElementById('editBtn');
  btn.disabled=true;btn.textContent='저장 중...';
  try{
    var r=await fetch(SB_URL+'/rest/v1/notices?id=eq.'+id,{method:'PATCH',headers:SB_HDR,body:JSON.stringify({title:title,date:date,body:body})});
    if(!r.ok)throw new Error();
    showToast('공지사항이 수정되었습니다.');
    closeEditModal();
    loadNotices();
  }catch(e){
    showStatus(st,'err','❌ 수정에 실패했습니다. 다시 시도해 주세요.');
  }
  btn.disabled=false;btn.textContent='저장하기';
}

async function deleteNotice(id,title){
  if(!confirm('['+title+']\n\n이 공지사항을 삭제하시겠습니까?'))return;
  try{
    var r=await fetch(SB_URL+'/rest/v1/notices?id=eq.'+id,{method:'DELETE',headers:SB_HDR});
    if(!r.ok)throw new Error();
    showToast('공지사항이 삭제되었습니다.');
    loadNotices();
  }catch(e){
    showToast('삭제에 실패했습니다.');
  }
}

function showStatus(el,type,msg){
  el.className='status-bar '+type;
  el.textContent=msg;
  el.style.display='block';
  if(type==='ok')setTimeout(function(){el.style.display='none';},3000);
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return String(s).replace(/'/g,"\\'");}

/* ===== 이모지 피커 ===== */
var EMOJI_CATS={
  '자주쓰는':['😊','🦝','✅','⚠️','🚫','📋','📍','📞','💬','🎉','🔔','📢'],
  '안내/경고':['⚠️','🚫','❌','✅','ℹ️','📢','📣','🔴','🟡','🟢','⛔','🆗'],
  '시간/장소':['📍','🕐','⏱️','📅','🗓️','🏪','🏢','🅿️','🗺️','🏠','🚗','🚶'],
  '번호/기호':['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','·','•','→','▶','◆','★'],
  '강조/포인트':['💡','🔑','📌','⭐','🌟','👉','👆','☝️','🎯','🔥','💯','🆕'],
  '소통/연락':['📱','💬','📞','✉️','📧','📲','🖥️','💻','🖨️','📠','📡','🔗']
};
var currentEmojiTarget=null;

function toggleEmoji(panelId, targetId){
  var panel=document.getElementById(panelId);
  var isOpen=panel.classList.contains('open');
  // 다른 패널 닫기
  document.querySelectorAll('.emoji-panel').forEach(function(p){p.classList.remove('open');});
  if(isOpen)return;
  currentEmojiTarget=document.getElementById(targetId);
  if(!panel.innerHTML){
    var cats=Object.keys(EMOJI_CATS);
    var catHtml='<div class="emoji-cats">';
    cats.forEach(function(c,i){
      catHtml+='<button class="emoji-cat-btn'+(i===0?' on':'')+'" onclick="switchCat(this,\''+c+'\',\''+panelId+'\')">'+ c+'</button>';
    });
    catHtml+='</div><div class="emoji-grid" id="'+panelId+'Grid">'+renderEmojiGrid(cats[0])+'</div>';
    panel.innerHTML=catHtml;
  }
  panel.classList.add('open');
}
function switchCat(btn,cat,panelId){
  var panel=document.getElementById(panelId);
  panel.querySelectorAll('.emoji-cat-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById(panelId+'Grid').innerHTML=renderEmojiGrid(cat);
}
function renderEmojiGrid(cat){
  return EMOJI_CATS[cat].map(function(e){
    return '<button class="emoji-item" onclick="insertEmoji(\''+e+'\')" title="'+e+'">'+e+'</button>';
  }).join('');
}
function insertEmoji(emoji){
  if(!currentEmojiTarget)return;
  var el=currentEmojiTarget;
  var start=el.selectionStart;
  var end=el.selectionEnd;
  var val=el.value;
  el.value=val.slice(0,start)+emoji+val.slice(end);
  el.selectionStart=el.selectionEnd=start+emoji.length;
  el.focus();
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.emoji-panel')&&!e.target.closest('.emoji-toggle-btn')){
    document.querySelectorAll('.emoji-panel').forEach(function(p){p.classList.remove('open');});
  }
});
/* ====================== */
